components:
  schemas:
    AccountActivationRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    AddStaffRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        phone_number:
          type: string
          nullable: true
          maxLength: 20
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - full_name
      - password
    AdminUserCreate:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        full_name:
          type: string
          maxLength: 255
        phone_number:
          type: string
          nullable: true
          maxLength: 20
        role:
          $ref: '#/components/schemas/RoleEnum'
        store:
          type: integer
          nullable: true
        is_active:
          type: boolean
      required:
      - email
      - full_name
    AdminUserCreateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        phone_number:
          type: string
          nullable: true
          maxLength: 20
        password:
          type: string
          writeOnly: true
          minLength: 1
        role:
          $ref: '#/components/schemas/RoleEnum'
        store:
          type: integer
          nullable: true
        is_active:
          type: boolean
      required:
      - email
      - full_name
      - password
    Allocation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        notes:
          type: string
          nullable: true
        product:
          type: integer
        allocated_from:
          type: string
          format: email
          nullable: true
        allocated_to:
          type: string
          format: email
          nullable: true
        store:
          type: integer
      required:
      - id
      - product
      - store
      - timestamp
    AllocationRequest:
      type: object
      properties:
        notes:
          type: string
          nullable: true
        product:
          type: integer
        allocated_from:
          type: string
          format: email
          minLength: 1
          nullable: true
        allocated_to:
          type: string
          format: email
          minLength: 1
          nullable: true
        store:
          type: integer
      required:
      - product
      - store
    AssignStoreRequest:
      type: object
      properties:
        store_id:
          type: integer
          nullable: true
        role:
          $ref: '#/components/schemas/RoleEnum'
    AvailabilityEnum:
      enum:
      - Private
      - Public
      type: string
      description: |-
        * `Private` - Private
        * `Public` - Public
    Bill:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        bill_type:
          $ref: '#/components/schemas/BillTypeEnum'
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        reference:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BillStatusEnum'
          readOnly: true
        description:
          type: string
        staff_count_change:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        created_at:
          type: string
          format: date-time
          readOnly: true
        paid_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        store:
          type: integer
        subscription:
          type: integer
          nullable: true
        plan:
          type: integer
          nullable: true
      required:
      - amount
      - bill_type
      - created_at
      - id
      - paid_at
      - reference
      - status
      - store
    BillRequest:
      type: object
      properties:
        bill_type:
          $ref: '#/components/schemas/BillTypeEnum'
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        description:
          type: string
        staff_count_change:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        store:
          type: integer
        subscription:
          type: integer
          nullable: true
        plan:
          type: integer
          nullable: true
      required:
      - amount
      - bill_type
      - store
    BillStatusEnum:
      enum:
      - Pending
      - Paid
      - Failed
      - Cancelled
      type: string
      description: |-
        * `Pending` - Pending
        * `Paid` - Paid
        * `Failed` - Failed
        * `Cancelled` - Cancelled
    BillTypeEnum:
      enum:
      - NewSubscription
      - Renewal
      - StaffAddition
      type: string
      description: |-
        * `NewSubscription` - NewSubscription
        * `Renewal` - Renewal
        * `StaffAddition` - StaffAddition
    BillingCycleEnum:
      enum:
      - Monthly
      - Yearly
      type: string
      description: |-
        * `Monthly` - Monthly
        * `Yearly` - Yearly
    BulkSoldRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
        imeis:
          type: array
          items:
            type: string
            minLength: 1
    ChangeOwnerRequest:
      type: object
      properties:
        new_owner_email:
          type: string
          format: email
          minLength: 1
      required:
      - new_owner_email
    ChangePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - new_password
      - old_password
    Condition:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 50
